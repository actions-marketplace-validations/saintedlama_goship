name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test
        run: go test ./...

  build:
    name: build docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: goship:ci

  action-smoke-test:
    name: action smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: run action
        id: goship
        uses: ./
        with:
          working-directory: '.'

      - name: verify output
        run: |
          echo "result: ${{ steps.goship.outputs.result }}"
          [ -n "${{ steps.goship.outputs.result }}" ] || exit 1
